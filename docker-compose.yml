services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: uptime
      POSTGRES_PASSWORD: uptime_dev
      POSTGRES_DB: uptime_cargas
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uptime -d uptime_cargas"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://uptime:uptime_dev@db:5432/uptime_cargas
      CRON_SECRET: local-dev-secret
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
